<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Leaderboard — Golfspot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c1b2a;
  --surf: #142537;
  --bd: #243a52;
  --tx: #ffffff;
  --txm: #94a3b8;
  --txh: #64748b;
  --g: #16a34a;
  --gl: rgba(22,163,74,0.15);
  --amb: #f59e0b;
  --r: 8px;
  --rl: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  overflow-x: hidden;
  margin: 0;
  padding: 0;
}



.lb-hd {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 6px;
  padding-bottom: 8px;
}
.lb-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; text-transform: uppercase; letter-spacing: .12em;
  color: #fca5a5; font-weight: 700;
}
.lb-eyebrow::before {
  content: ''; width: 8px; height: 8px;
  background: #ef4444; border-radius: 50%;
  animation: pulse 1.5s infinite;
}
/* Leaderboard rijen */
.lb-row {
  display: flex;
  align-items: center;
  gap: .85rem;
  padding: .85rem 1rem;
  background: var(--surf);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  transition: background .2s;
}

.lb-row:hover { background: rgba(255,255,255,0.03); }

.lb-row.top {
  border-color: rgba(251, 191, 36, 0.3);
  background: linear-gradient(90deg, rgba(251,191,36,0.08), var(--surf) 60%);
}

/* Desktop container — pakt volledige breedte */
.lb-container {
  width: 100%;
  max-width: 100%;
  margin: 0;
  padding: 1.5rem 2rem;
  box-sizing: border-box;
}

@media (min-width: 1200px) {
  .lb-container {
    max-width: 1400px;
    margin: 0 auto;
  }
}

#lb-content {
  width: 100%;
  display: block;
  box-sizing: border-box;
}

.lb-pos {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; flex-shrink: 0;
  font-family: 'Inter', sans-serif;
}

.lb-pos.lb-1 { background: linear-gradient(135deg, #fcd34d, #f59e0b); color: #422006; box-shadow: 0 4px 12px rgba(251,191,36,0.3); }
.lb-pos.lb-2 { background: linear-gradient(135deg, #e5e7eb, #9ca3af); color: #1f2937; }
.lb-pos.lb-3 { background: linear-gradient(135deg, #fb923c, #c2410c); color: #fff; }
.lb-pos.lb-n { background: var(--bd); color: var(--txm); }

.lb-naam { flex: 1; min-width: 0; }

.lb-naam-tx {
  font-size: 16px; font-weight: 600; color: #fff;
  display: flex; align-items: center; gap: 6px;
  line-height: 1.2;
  white-space: nowrap;
}

.lb-naam-tx > .lb-naam-text {
  overflow: hidden;
  text-overflow: ellipsis;
}

.lb-naam-sub {
  font-size: 11px;
  color: var(--txm);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lb-naam-sub {
  font-size: 12px; color: var(--txm); margin-top: 2px;
}

.lb-score {
  font-size: 22px; font-weight: 800;
  color: #4ade80; text-align: right;
  font-family: 'Inter', sans-serif;
  flex-shrink: 0;
  line-height: 1;
}

.lb-score.under { color: #4ade80; }
.lb-score.over { color: #f87171; }

.gw-tag {
  display: inline-block;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  text-transform: uppercase;
  font-weight: 700;
  letter-spacing: .05em;
  vertical-align: middle;
}

@media (max-width: 768px) {
  .lb-container { padding: 0.4rem 0.3rem; }
  .lb-team-head { padding: 10px 10px; gap: 8px; }
  .lb-team-head .lb-pos { width: 30px; height: 30px; font-size: 13px; }
  .lb-team-names { font-size: 13px; }
  .lb-team-progress { font-size: 10px; }
  .lb-team-meta { font-size: 9px; }
  .lb-team-score-main { font-size: 22px; }
  .lb-team-score-vspar { font-size: 11px; }
  .lb-team-arrow { font-size: 12px; }
  .lb-row { padding: .65rem .75rem; gap: .55rem; }
  /* Verberg secundaire kolommen op smal scherm — info komt inline onder teamnaam */
  .lb-col-bruto, .lb-col-vspar, .lb-col-gespeeld { display: none !important; }
  .lb-col-bruto-th, .lb-col-vspar-th, .lb-col-gespeeld-th { display: none !important; }
  .lb-mobile-sub { display: block !important; }
}

/* Card-layout voor team-leaderboard — werkt op alle viewports */
.lb-team-cards { display: flex; flex-direction: column; gap: 8px; }
.lb-team-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
  transition: all 0.15s;
}
.lb-team-card:hover { background: rgba(255,255,255,0.06); }
/* Flex layout: pos | info (3 lines) | score | arrow */
.lb-team-head {
  padding: 11px 14px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 12px;
}
/* Position circle (compacter dan eerder) */
.lb-team-head .lb-pos {
  flex-shrink: 0;
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px;
}
/* Info block — 3 stacked text rows */
.lb-team-info {
  flex: 1;
  min-width: 0;
}
.lb-team-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: #4ade80;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  line-height: 1;
}
.lb-team-meta .dot {
  color: rgba(255,255,255,0.3);
  font-weight: 400;
}
.lb-team-meta .badge-thru {
  color: rgba(255,255,255,0.6);
}
.lb-team-meta .badge-sh {
  color: rgba(255,255,255,0.4);
}
.lb-team-names {
  font-size: 14px;
  color: #fff;
  font-weight: 500;
  line-height: 1.2;
  margin-top: 4px;
  /* Truncate met ellipsis ipv wrap */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lb-team-progress {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 3px;
  line-height: 1;
}
/* Score blok rechts */
.lb-team-score {
  flex-shrink: 0;
  text-align: right;
  min-width: 50px;
}
.lb-team-score-main {
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  line-height: 1;
  font-family: 'Inter', sans-serif;
}
.lb-team-score-main.lb-under { color: #4ade80; }
.lb-team-score-main.lb-over { color: #f87171; }
.lb-team-score-vspar {
  font-size: 12px;
  font-weight: 700;
  margin-top: 3px;
  line-height: 1;
}
.lb-team-score-vspar.lb-under { color: #4ade80; }
.lb-team-score-vspar.lb-over { color: #f87171; }
.lb-team-score-vspar.lb-even { color: rgba(255,255,255,0.5); }
.lb-team-arrow {
  flex-shrink: 0;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
  transition: transform 0.2s;
}
/* Empty state (no score yet) */
.lb-team-score-empty {
  font-size: 22px;
  color: rgba(255,255,255,0.25);
  line-height: 1;
}
.lb-team-score-empty-label {
  font-size: 9px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 3px;
}
/* Team member lijst in uitklap-detail */
.lb-tv-team-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 14px;
  padding: 10px 14px 4px;
  font-size: 12px;
}
.lb-tv-team-member {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
}
.lb-tv-team-member .member-name {
  color: #fff;
  font-weight: 500;
}
.lb-tv-team-member .member-hcp {
  color: rgba(255,255,255,0.45);
  font-size: 11px;
}

/* Desktop: meer ademruimte, grotere score */
@media (min-width: 641px) {
  .lb-team-head { padding: 13px 18px; gap: 16px; }
  .lb-team-head .lb-pos { width: 40px; height: 40px; font-size: 16px; }
  .lb-team-names { font-size: 15px; }
  .lb-team-score-main { font-size: 28px; }
  .lb-team-score-empty { font-size: 26px; }
  .lb-tv-team-list { padding: 12px 18px 6px; font-size: 13px; }
}
.lb-team-detail {
  border-top: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.2);
  padding: 12px 8px;
  overflow-x: auto;
}
.lb-tv-scorekaart {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
}
.lb-tv-scorekaart th {
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 6px;
  text-align: center;
}
.lb-tv-scorekaart th:first-child { text-align: left; padding-left: 8px; }
.lb-tv-scorekaart td {
  padding: 4px 6px;
  text-align: center;
  color: rgba(255,255,255,0.7);
}
.lb-tv-scorekaart td:first-child {
  text-align: left;
  padding-left: 8px;
  color: rgba(255,255,255,0.5);
}
.lb-tv-scorekaart .tot {
  color: #fff;
  font-weight: 700;
  border-left: 1px solid rgba(255,255,255,0.1);
}
.lb-tv-scorekaart .lb-empty { color: rgba(255,255,255,0.2); }
.lb-tv-scorekaart .lb-sc {
  display: inline-block;
  min-width: 26px;
  padding: 3px 6px;
  border-radius: 5px;
  font-weight: 600;
  background: rgba(255,255,255,0.06);
  color: #fff;
}
.lb-tv-scorekaart .lb-sc.sc-eagle {
  background: #16a34a;
  color: #fff;
  box-shadow: 0 0 0 1px rgba(74,222,128,0.6);
}
.lb-tv-scorekaart .lb-sc.sc-birdie {
  background: rgba(74,222,128,0.25);
  color: #4ade80;
}
.lb-tv-scorekaart .lb-sc.sc-bogey {
  background: rgba(251,146,60,0.25);
  color: #fb923c;
}
.lb-tv-scorekaart .lb-sc.sc-double {
  background: rgba(248,113,113,0.25);
  color: #f87171;
}

/* Compactere kolommen — mobile-specific */
@media (max-width: 768px) {
  table.lb th, table.lb td { padding: .5rem .35rem !important; font-size: 13px !important; }
  .lb-pos { width: 30px; height: 30px; font-size: 13px; flex-shrink: 0; }
  .lb-naam-tx { font-size: 15px; }
  .lb-naam-sub { font-size: 11px; margin-top: 1px; }
  .lb-score { font-size: 20px; min-width: 0; }
  .lb-titel { font-size: 22px; }
  .lb-sub { font-size: 12px; }
  .lb-hd { gap: 0.5rem; }
  /* Header club + refresh op 1 rij op mobiel */
  .lb-meta {
    display: flex !important;
    flex-direction: row;
    align-items: center;
    width: 100%;
    justify-content: space-between;
    gap: .5rem;
  }
  .lb-club { font-size: 9px; letter-spacing: .1em; }
  .lb-refresh { padding: 3px 8px; font-size: 9px; letter-spacing: .04em; }
  /* Top-stats compacter */
  .gw-stats { padding: .85rem 1rem !important; }
  .gw-stats-grid { gap: 1rem !important; }
  .gw-stats-item-num { font-size: 22px !important; }
  .gw-stats-item-vorm { font-size: 13px !important; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.lb-titel { font-size: 32px; font-weight: 800; line-height: 1.05; color: #fff; letter-spacing: -0.02em; }
.lb-sub { font-size: 14px; color: var(--txm); margin-top: 4px; }

.lb-meta {
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  font-size: 12px; color: var(--txm);
}
.lb-refresh {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surf); border: 1px solid var(--bd);
  border-radius: 999px; padding: 6px 12px;
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--txm);
}
.lb-refresh-dot {
  width: 6px; height: 6px; background: var(--g); border-radius: 50%;
  animation: pulse 2s infinite;
}
.lb-club { font-size: 11px; text-transform: uppercase; letter-spacing: .15em; color: var(--txm); font-weight: 600; }

.tbl-wrap {
  background: var(--surf); border: 1px solid var(--bd);
  border-radius: var(--rl); overflow: hidden;
}
.tbl { width: 100%; border-collapse: collapse; font-size: 16px; }
.tbl thead { background: rgba(255,255,255,0.04); }
.tbl th {
  text-align: left; padding: 12px 16px;
  font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--txm); font-weight: 700; border-bottom: 1px solid var(--bd);
}
.tbl td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--tx); }
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr:nth-child(-n+3) td:first-child {
  font-weight: 800; color: #fbbf24; font-size: 18px;
}

.sponsor-banner {
  background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  border: 1px solid rgba(255,255,255,0.08);
  border-top: 2px solid #fbbf24;
  border-radius: var(--rl); padding: 1.25rem 1.5rem;
  text-align: center; color: #fff;
}
.sponsor-banner-eyebrow {
  font-size: 10px; text-transform: uppercase; letter-spacing: .15em;
  color: #fbbf24; font-weight: 700; margin-bottom: 10px;
}
.sponsor-banner-name {
  font-size: 22px; font-weight: 700; color: #fff;
  display: inline-flex; align-items: center; justify-content: center; gap: 14px;
}
.sponsor-banner-co {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex; gap: 1.5rem; justify-content: center; align-items: center;
  flex-wrap: wrap; font-size: 13px; color: rgba(255,255,255,0.8);
}

.lb-loading { text-align: center; padding: 3rem; color: var(--txm); font-size: 14px; }
.lb-error {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.4);
  color: #fca5a5; padding: 1rem 1.25rem;
  border-radius: var(--r); font-size: 14px;
}

.lb-controls {
  position: fixed; bottom: 1rem; right: 1rem;
  display: flex; gap: 8px; z-index: 100;
}
.lb-ctrl-btn {
  background: var(--surf); border: 1px solid var(--bd);
  color: var(--txm); padding: 8px 14px; border-radius: 999px;
  cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500;
}
.lb-ctrl-btn:hover { color: var(--tx); background: var(--bd); }

.tbl .badge {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 600;
}
.tbl .bg { background: rgba(22,163,74,0.2); color: #4ade80; }
.tbl .bb { background: rgba(59,130,246,0.2); color: #60a5fa; }
.tbl .bx { background: rgba(239,68,68,0.2); color: #f87171; }
.tbl .ba { background: rgba(245,158,11,0.2); color: #fbbf24; }

@media (max-width: 800px) {
 
  .lb-titel { font-size: 22px; }
  .tbl { font-size: 14px; }
  .tbl th, .tbl td { padding: 10px 8px; }
}
</style>
</head>
<body>

<div class="lb-container">
  <div class="lb-hd">
    <div class="lb-eyebrow">LIVE</div>
    <div class="lb-titel" id="lb-titel">Leaderboard</div>
    <!-- Hidden placeholders: JS schrijft hier nog naartoe, we tonen ze gewoon niet -->
    <span id="lb-sub" style="display:none"></span>
    <span id="lb-club" style="display:none"></span>
    <span id="lb-refresh-text" style="display:none"></span>
  </div>

  <div id="lb-content" class="lb-loading">Wedstrijd laden...</div>

  <div id="lb-sponsor"></div>
</div>

<div class="lb-controls">
  <button class="lb-ctrl-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// LIVE LEADERBOARD — STANDALONE TV-MODE
// Auto-refresh elke 15s. Geen login nodig.
// ═══════════════════════════════════════════════════════════════

var SUPA_URL = "https://zyxusjhxncwytohjxrnu.supabase.co";
var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5eHVzamh4bmN3eXRvaGp4cm51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NjUyNDAsImV4cCI6MjA5MjI0MTI0MH0.FaKpwQtIseR_2Vz0jw9lZWWbdT535CwoteRaeMENyWM";

// Globale data
var USERS = [];
var WEDSTRIJDEN = [];
var INSCHRIJVINGEN = [];
var SCORES = {};
var FLIGHTS = {};
var SPONSOREN = [];
var WEDSTRIJD_SPONSOREN = [];
var _currentUser = null;

// Wedstrijd-ID uit URL
var urlParams = new URLSearchParams(window.location.search);
var WID = urlParams.get('w') || urlParams.get('wid') || urlParams.get('wedstrijd');
var GW_CODE = urlParams.get('gw') || urlParams.get('groep');

// Ondersteun ook compact UUID-formaat (32 hex zonder streepjes)
// — chat-apps knippen lange URLs met streepjes soms af
function normaliseerUUID(s) {
  if (!s) return null;
  s = s.toLowerCase().trim();
  // Al juiste formaat?
  if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/.test(s)) {
    return s;
  }
  // Compact 32-char zonder streepjes? Voeg streepjes toe.
  if (/^[0-9a-f]{32}$/.test(s)) {
    return s.slice(0,8) + '-' + s.slice(8,12) + '-' + s.slice(12,16) + '-' + s.slice(16,20) + '-' + s.slice(20,32);
  }
  return null; // ongeldig
}
WID = normaliseerUUID(WID);
var UUID_REGEX = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
var WID_VALID = WID && UUID_REGEX.test(WID);
var IS_GW = !!GW_CODE;
var GW_DATA = null;  // Cache voor gw-data

var BAAN_18 = {
  naam: 'De Hooge Rotterdamsche',
  holes: 18,
  // UIT (1-9): 4-4-4-3-5-4-4-4-4 = 36
  // IN (10-18): 5-3-5-3-4-3-4-4-4 = 35
  par: [4,4,4,3,5,4,4,4,4,  5,3,5,3,4,3,4,4,4],
  si:  [8,10,14,18,12,16,2,4,6,  9,17,1,15,3,11,5,13,7],
  // Lengtes per tee (meters), index 0 = wit, 1 = geel, 2 = blauw, 3 = rood, 4 = oranje
  lengtes: {
    wit:    [377,333,279,119,463,254,380,384,362, 492,103,500,157,350,157,310,310,374],  // 5656m
    geel:   [336,294,269,119,449,239,355,373,323, 460,103,465,146,339,144,300,312,305],  // 5331m
    blauw:  [336,294,237,109,390,239,355,307,323, 437,103,456,141,316,144,300,307,268],  // 5067m
    rood:   [314,251,232,109,384,210,316,298,273, 366,103,448,134,310,133,258,249,263],  // 4651m
    oranje: [194,193,167,109,321,162,250,264,247, 309,103,332, 92,241, 73,210,249,206]   // 3722m
  }
};


function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatVsPar(d){return d===0?'E':d>0?'+'+d:''+d;}

function scoreKlasse(s,par,extra){if(!s)return '';var n=Number(s)-extra;if(n<=par-2)return 'eagle';if(n===par-1)return 'birdie';if(n===par+1)return 'bogey';if(n>=par+2)return 'double';return 'par';}

function pasESCtoe(s,par,extra,esc){if(!s||s<=0)return s;if(esc==='double')return Math.min(s,par+2);if(esc==='triple')return Math.min(s,par+3);if(esc==='nettodouble')return Math.min(s,par+2+extra);return s;}

function stablefordPunten(s,par,extra){if(s===null||s==='')return 0;var d=par-(Number(s)-extra);return d>=3?5:d===2?4:d===1?3:d===0?2:d===-1?1:0;}

function berekenSpeelhandicap(ega,slope,cr,par,perc,holes){slope=slope||113;cr=cr||72;par=par||72;perc=perc||1.0;holes=holes||18;var sh=Math.round(ega*(slope/113)+(cr-par));sh=Math.round(sh*perc);if(holes===9)sh=Math.round(sh/2);return sh;}

function extraSlagenPerHole(sh,si){return si.map(function(s){return Math.floor(sh/si.length)+(Math.abs(sh)%si.length>=s?Math.sign(sh)||0:0);});}

function berekenStrokeplay(scores,baan,sh,esc){
  esc=esc||'geen';
  var ex=extraSlagenPerHole(sh,baan.si);
  var bruto=0,netto=0,parGespeeld=0;
  var perHole=scores.map(function(s,i){
    if(s===null||s==='')return{bruto:null,netto:null,extra:ex[i],par:baan.par[i]};
    var g=pasESCtoe(Number(s),baan.par[i],ex[i],esc);bruto+=g;netto+=g-ex[i];parGespeeld+=baan.par[i];
    return{bruto:g,netto:g-ex[i],extra:ex[i],par:baan.par[i]};
  });
  return{perHole:perHole,bruto:bruto,netto:netto,nettoVsPar:netto-baan.parTotaal,brutoVsPar:bruto-baan.parTotaal,brutoVsParGespeeld:bruto-parGespeeld,nettoVsParGespeeld:netto-parGespeeld,parGespeeld:parGespeeld,gespeeld:scores.filter(function(s){return s!==null&&s!=='';}).length};
}

function berekenStableford(scores,baan,sh){
  var ex=extraSlagenPerHole(sh,baan.si);var tot=0;
  var perHole=scores.map(function(s,i){var p=stablefordPunten(s,baan.par[i],ex[i]);tot+=p;return{slagen:s!==null&&s!==''?Number(s):null,extra:ex[i],punten:p,par:baan.par[i]};});
  return{perHole:perHole,punten:tot,gespeeld:scores.filter(function(s){return s!==null&&s!=='';}).length};
}

function teamHandicapScramble(spelers, perc, formule) {
  perc = perc || 1.0;
  formule = formule || 'app';
  var sortHcp = spelers.map(function(s) { return s.hcp || 0; }).sort(function(a, b) { return a - b; });
  var n = sortHcp.length;
  if (n === 0) return 0;
  if (formule === 'a') {
    // 10:15:20:25 verhoudingen, 60/75/90/100% schaal naar teamgrootte
    var ratios, totalPct;
    var base = [2, 3, 4, 5];
    if (n >= 4) { ratios = base; totalPct = 0.60; }
    else if (n === 3) { ratios = base.slice(1); totalPct = 0.75; }
    else if (n === 2) { ratios = base.slice(2); totalPct = 0.90; }
    else { ratios = [base[3]]; totalPct = 1.00; }
    var sumRatios = ratios.reduce(function(a, b) { return a + b; }, 0);
    var factor = totalPct / sumRatios;
    var som = 0;
    for (var i = 0; i < n && i < ratios.length; i++) {
      som += sortHcp[i] * ratios[i] * factor;
    }
    return Math.round(som);
  }
  // Default 'app'
  var gewichten = [1.0, 0.6, 0.4, 0.2];
  var som2 = sortHcp.reduce(function(a, h, i) { return a + h * (gewichten[i] || 0.2); }, 0);
  return Math.round((som2 / n) * perc);
}

function gebruiktHcp(w) {
  var perc = parseInt(w && w.hcpperc);
  return (isNaN(perc) ? 100 : perc) > 0;
}

function hcpPercFraction(w) {
  var perc = parseInt(w && w.hcpperc);
  return (isNaN(perc) ? 100 : perc) / 100;
}

function zichtbareHoles(w) {
  var totaal = w.holes || 18;
  var blind = parseInt(w.blindHoles) || 0;
  if (blind <= 0) return totaal;
  if (_currentUser && (_currentUser.rol === 'Superadmin' || _currentUser.rol === 'Wedstrijdleider' || _currentUser.rol === 'Secretaris')) return totaal;
  if (w.status === 'afgerond') return totaal;
  return Math.max(0, totaal - blind);
}

function filterScoresVoorBlind(scores, w) {
  var zichtbaar = zichtbareHoles(w);
  var totaal = w.holes || 18;
  if (zichtbaar >= totaal) return scores;
  var nieuw = scores.slice(0, zichtbaar);
  for (var i = zichtbaar; i < totaal; i++) nieuw.push('');
  return nieuw;
}

function blindHint(w) {
  // Bewust uitgeschakeld op standalone leaderboard: publieke kijkers willen
  // gewoon de stand zien, niet de technische uitleg over verborgen holes.
  // Admin-tab behoudt 'm wel (zie index.html).
  return '';
}

function buildLeaderboard(wId,ronde,baan,sps,w){
  // Texas Scramble heeft team leaderboard
  if (w.vorm === 'Texas Scramble' || w.vorm === 'Scramble') return buildTeamLeaderboard(wId, ronde, baan, sps, w);
  var rows=sps.map(function(s){
    var sh=berekenSpeelhandicap(s.hcp,w.slope,w.cr,baan.parTotaal,w.hcpperc/100,w.holes);
    var sc=(SCORES[wId]&&SCORES[wId][ronde]&&SCORES[wId][ronde][s.id])||Array(baan.holes).fill('');
    sc = filterScoresVoorBlind(sc, w);
    var sp=berekenStrokeplay(sc,baan,sh,w.esc||'geen');
    var sf=berekenStableford(sc,baan,sh);
    return{naam:s.voor+' '+s.ach,sh:sh,netto:sp.netto,bruto:sp.bruto,nettoVsPar:sp.nettoVsPar,sfPts:sf.punten,gespeeld:sp.gespeeld,has:sp.gespeeld>0};
  });
  if(w.vorm==='Stableford')rows.sort(function(a,b){return !a.has?1:!b.has?-1:b.sfPts-a.sfPts;});
  else rows.sort(function(a,b){return !a.has?1:!b.has?-1:a.netto-b.netto;});
  var html=blindHint(w)+'<table class="tbl"><thead><tr><th style="width:32px">#</th><th>Speler</th><th>SH</th>';
  if(w.vorm==='Stableford')html+='<th>Punten</th><th>Gespeeld</th>';
  else html+='<th>Netto</th><th>Bruto</th><th>+/- par</th><th>Gespeeld</th>';
  html+='</tr></thead><tbody>';
  rows.forEach(function(r,i){
    var p=i+1;var pcls=p===1?'lb-1':p===2?'lb-2':p===3?'lb-3':'lb-n';
    html+='<tr><td><div class="lb-pos '+pcls+'">'+p+'</div></td><td style="font-weight:500">'+r.naam+'</td><td style="color:var(--txm)">'+r.sh+'</td>';
    if(w.vorm==='Stableford')html+='<td style="color:var(--gm);font-weight:500">'+(r.has?r.sfPts:'—')+'</td><td style="color:var(--txm)">'+r.gespeeld+'/'+baan.holes+'</td>';
    else html+='<td style="font-weight:500">'+(r.has?r.netto:'—')+'</td><td style="color:var(--txm)">'+(r.has?r.bruto:'—')+'</td><td class="'+(r.has&&r.nettoVsPar<0?'under':r.has&&r.nettoVsPar>0?'over':'')+'">'+(r.has?formatVsPar(r.nettoVsPar):'—')+'</td><td style="color:var(--txm)">'+r.gespeeld+'/'+baan.holes+'</td>';
    html+='</tr>';
  });
  return html+'</tbody></table>';
}

// Pak het meest-complete scores-array voor een team in Texas Scramble.
// Identiek aan helper in index.html. Lost op dat na re-login team-N cache
// gone is en spelers[0] soms een teammate is met partial/stale data.
function pickTeamScoresArray(wId, ronde, spelers, fi) {
  var teamKey = 'team-' + fi;
  var fromCache = SCORES[wId] && SCORES[wId][ronde] && SCORES[wId][ronde][teamKey];
  if (Array.isArray(fromCache)) return fromCache;
  if (!spelers || !spelers.length) return null;
  var best = null, bestCount = -1;
  for (var i = 0; i < spelers.length; i++) {
    var arr = SCORES[wId] && SCORES[wId][ronde] && SCORES[wId][ronde][spelers[i].id];
    if (Array.isArray(arr)) {
      var filled = 0;
      for (var j = 0; j < arr.length; j++) {
        if (arr[j] !== '' && arr[j] !== null && arr[j] !== undefined) filled++;
      }
      if (filled > bestCount) { bestCount = filled; best = arr; }
    }
  }
  return best;
}

function buildTeamLeaderboard(wId, ronde, baan, sps, w) {
  var flights = FLIGHTS[wId] || [];
  if (!flights.length) return '<p style="font-size:13px;color:var(--txm);padding:1rem">Geen flights aangemaakt.</p>';

  var perc = hcpPercFraction(w);  // safe voor hcpperc=0
  var rows = flights.map(function(flightSids, fi) {
    var spelers = flightSids.map(function(sid) {
      return sps.find(function(s) { return s.id === sid; });
    }).filter(Boolean);
    if (!spelers.length) return null;

    var teamHcp = teamHandicapScramble(spelers, perc, w.tsFormule || w.ts_formule || 'app');
    var teamSh = berekenSpeelhandicap(teamHcp, w.slope, w.cr, baan.parTotaal, 1.0, w.holes);
    var scores = pickTeamScoresArray(wId, ronde, spelers, fi);
    scores = scores || Array(baan.holes).fill('');
    scores = filterScoresVoorBlind(scores, w);
    var sp = berekenStrokeplay(scores, baan, teamSh, w.esc || 'geen');

    return {
      flight: fi + 1,
      flightIdx: fi,
      teamNaam: spelers.map(function(s) { return s.voor[0] + '. ' + s.ach; }).join(', '),
      spelers: spelers,
      teamSh: teamSh,
      netto: sp.netto, bruto: sp.bruto,
      nettoVsPar: sp.nettoVsPar,
      brutoVsParGespeeld: sp.brutoVsParGespeeld,
      nettoVsParGespeeld: sp.nettoVsParGespeeld,
      gespeeld: sp.gespeeld,
      has: sp.gespeeld > 0,
      scores: scores
    };
  }).filter(Boolean);

  var metHcp = gebruiktHcp(w);
  rows.sort(function(a,b) {
    if (!a.has) return 1; if (!b.has) return -1;
    // Sorteer op vsPar t.o.v. gespeelde holes (eerlijk bij partial play),
    // tiebreaker = aantal gespeelde holes (meer is verder, dus eerder klaar)
    var aVs = metHcp ? a.nettoVsParGespeeld : a.brutoVsParGespeeld;
    var bVs = metHcp ? b.nettoVsParGespeeld : b.brutoVsParGespeeld;
    if (aVs !== bVs) return aVs - bVs;
    return b.gespeeld - a.gespeeld;
  });

  var html = blindHint(w);

  // CARDS layout — schone PGA-stijl horizontale rij per team
  html += '<div class="lb-team-cards">';
  rows.forEach(function(r, i) {
    var p = i+1;
    var pcls = p===1?'lb-1':p===2?'lb-2':p===3?'lb-3':'lb-n';
    var detailId = 'lb-tv-detail-' + r.flightIdx;
    var arrowId = 'lb-tv-arrow-' + r.flightIdx;
    var isKlaar = r.gespeeld >= baan.holes;
    var vsPar = metHcp ? r.nettoVsParGespeeld : r.brutoVsParGespeeld;

    html += '<div class="lb-team-card">';
    html += '<div class="lb-team-head" onclick="toggleTvFlight(\'' + detailId + '\', \'' + arrowId + '\')">';

    // Positie cirkel
    html += '<div class="lb-pos ' + pcls + '">' + p + '</div>';

    // Info block: 3 stacked lines (meta · names · progress)
    html += '<div class="lb-team-info">';
    // Line 1: FLIGHT badge (+ SH bij HCP-mode én SH > 0)
    html += '<div class="lb-team-meta">';
    html += '<span>FLIGHT ' + r.flight + '</span>';
    if (metHcp && r.teamSh > 0) {
      html += '<span class="dot">·</span>';
      html += '<span class="badge-sh">SH ' + r.teamSh + '</span>';
    }
    html += '</div>';
    // Line 2: namen (truncated met ellipsis)
    html += '<div class="lb-team-names">' + escHtml(r.teamNaam) + '</div>';
    // Line 3: alleen "Klaar" tonen als ronde af — anders staat 'na N' al bij score blok
    if (isKlaar) {
      html += '<div class="lb-team-progress">Klaar · ' + baan.holes + ' holes</div>';
    } else if (!r.has) {
      html += '<div class="lb-team-progress">Nog niet gestart</div>';
    }
    html += '</div>'; // /info

    // Score blok (right)
    html += '<div class="lb-team-score">';
    if (r.has) {
      var hoofdSc = metHcp ? r.netto : r.bruto;
      var hoofdCls = vsPar < 0 ? 'lb-under' : vsPar > 0 ? 'lb-over' : '';
      html += '<div class="lb-team-score-main ' + hoofdCls + '">' + hoofdSc + '</div>';
      // vsPar t.o.v. par van gespeelde holes — eerlijk tijdens partial play
      var nvpStr = vsPar > 0 ? '+' + vsPar : (vsPar < 0 ? vsPar : 'E');
      var nvpCls = vsPar < 0 ? 'lb-under' : vsPar > 0 ? 'lb-over' : 'lb-even';
      html += '<div class="lb-team-score-vspar ' + nvpCls + '">' + nvpStr +
        (!isKlaar ? ' <span style="color:#94a3b8;font-weight:400;font-size:10px">na ' + r.gespeeld + '</span>' : '') + '</div>';
    } else {
      html += '<div class="lb-team-score-empty">—</div>';
      html += '<div class="lb-team-score-empty-label">nog niet</div>';
    }
    html += '</div>';

    // Arrow
    html += '<div class="lb-team-arrow" id="' + arrowId + '">▼</div>';

    html += '</div>'; // /head clickable

    // Detail (uitklap met scorekaart per hole) — onveranderd
    html += '<div class="lb-team-detail" id="' + detailId + '" style="display:none">';
    if (r.has || r.scores.some(function(s) { return s !== '' && s !== null; })) {
      html += buildTvFlightScorekaart(r, baan, w);
    } else {
      html += '<div style="text-align:center;padding:1rem;color:rgba(255,255,255,0.4);font-size:12px">Nog geen scores ingevoerd</div>';
    }
    html += '</div>'; // /detail

    html += '</div>'; // /card
  });
  html += '</div>';
  return html;
}

// Helper: scorekaart-tabel per hole voor flight-detail in TV/share leaderboard
function buildTvFlightScorekaart(r, baan, w) {
  var metHcp = (typeof gebruiktHcp === 'function') ? gebruiktHcp(w) : (Number(w.hcpperc || w.hcp_perc || 100) > 0);
  var html = '';

  // Team-member lijst bovenaan (volledige namen + HCP)
  if (r.spelers && r.spelers.length) {
    html += '<div class="lb-tv-team-list">';
    r.spelers.forEach(function(s) {
      html += '<div class="lb-tv-team-member">';
      html += '<span class="member-name">' + escHtml(s.voor + ' ' + s.ach) + '</span>';
      if (s.hcp !== null && s.hcp !== undefined) {
        html += '<span class="member-hcp">HCP ' + Number(s.hcp).toFixed(1) + '</span>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  // Score-tabel per hole
  html += '<table class="lb-tv-scorekaart">';
  html += '<thead><tr><th>Hole</th>';
  for (var i = 0; i < baan.holes; i++) {
    html += '<th>' + (i + 1) + '</th>';
  }
  html += '<th class="tot">Tot</th></tr></thead><tbody>';
  // Par-rij
  html += '<tr><td>Par</td>';
  for (var i = 0; i < baan.holes; i++) {
    html += '<td>' + baan.par[i] + '</td>';
  }
  html += '<td class="tot">' + baan.parTotaal + '</td></tr>';
  // Score-rij
  html += '<tr><td><strong>Team</strong></td>';
  var brutoTotal = 0;
  for (var hi = 0; hi < baan.holes; hi++) {
    var s = r.scores[hi];
    if (s !== '' && s !== null && s !== undefined) {
      var n = Number(s);
      brutoTotal += n;
      var par = baan.par[hi];
      var diff = n - par;
      var cls = '';
      if (diff <= -2) cls = 'sc-eagle';
      else if (diff === -1) cls = 'sc-birdie';
      else if (diff === 1) cls = 'sc-bogey';
      else if (diff >= 2) cls = 'sc-double';
      html += '<td><span class="lb-sc ' + cls + '">' + n + '</span></td>';
    } else {
      html += '<td class="lb-empty">—</td>';
    }
  }
  html += '<td class="tot"><strong>' + (brutoTotal || '—') + '</strong></td></tr>';
  html += '</tbody></table>';
  return html;
}

// Toggle: open/dicht detail in TV-leaderboard
function toggleTvFlight(detailId, arrowId) {
  var detail = document.getElementById(detailId);
  var arrow = document.getElementById(arrowId);
  if (!detail) return;
  var isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
}

var SIDE_GAME_TYPES = [
  { type: 'neary',          label: 'Neary',         subtitle: '', kleur: '#0ea5e9', icon: '🎯' },
  { type: 'longest-drive',  label: 'Longest Drive', subtitle: '', kleur: '#f97316', icon: '💪' },
  { type: 'leary',          label: 'Leary',         subtitle: '', kleur: '#a855f7', icon: '⛳' }
];

function sideGameMeta(type) {
  return SIDE_GAME_TYPES.find(function(x) { return x.type === type; }) ||
    { type: type, label: type, subtitle: '', kleur: '#6b7280', icon: '🏆' };

function isSideGameType(type) {
  return SIDE_GAME_TYPES.some(function(x) { return x.type === type; });
}

function sideGamesVoorWedstrijd(wId) {
  var koppels = (WEDSTRIJD_SPONSOREN || []).filter(function(k) {

function _renderCarouselSlide(sponsor, dark) {

function getBaan9(welkeNegen) {
  var w = welkeNegen === 'in' ? 9 : 0;
  var siRaw = BAAN_18.si.slice(w, w+9);
  // Hernummer SI 1-18 → 1-9 ranking voor correcte stroke-verdeling op 9 holes
  var sorted = siRaw.slice().sort(function(a, b) { return a - b; });
  var siRank = siRaw.map(function(s) { return sorted.indexOf(s) + 1; });
  return {
    naam: BAAN_18.naam + ' (' + (welkeNegen === 'in' ? 'IN, hole 10-18' : 'UIT, hole 1-9') + ')',
    holes: 9,
    par: BAAN_18.par.slice(w, w+9),
    si: siRank,
    siOrigineel: siRaw,
    welkeNegen: welkeNegen || 'uit'
  };
}

function getBaan(holes, cPar, cSI, welkeNegen) {
  var b;
  if (holes === 9) {
    b = (typeof getBaan9 === 'function') ? getBaan9(welkeNegen) : BAAN_18;
  } else {
    b = BAAN_18;
  }
  return {
    holes: b.holes,
    par: cPar || b.par,
    si: cSI || b.si,
    parTotaal: (cPar || b.par).reduce(function(a, x) { return a + x; }, 0),
    welkeNegen: b.welkeNegen
  };
}

// ─── Supabase fetch met retry voor cold-start / rate-limit ──
async function supaGET(table, params, retries) {
  params = params || {};
  retries = (retries == null) ? 2 : retries;  // 2 retries = 3 pogingen totaal
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  var url = SUPA_URL + '/rest/v1/' + table + (qs ? '?' + qs : '');

  var lastError;
  for (var attempt = 0; attempt <= retries; attempt++) {
    try {
      var res = await fetch(url, {
        headers: {
          'apikey': SUPA_KEY,
          'Authorization': 'Bearer ' + SUPA_KEY,
          'Content-Type': 'application/json'
        }
      });
      if (res.ok) return await res.json();
      // 4xx behalve 408/429 zijn permanente fouten — geen retry zinvol
      if (res.status >= 400 && res.status < 500 && res.status !== 408 && res.status !== 429) {
        // Wacht: HTTP 400 is meestal request-fout, maar Supabase geeft 'm soms ook bij cold-start
        // Dus we retryen alleen als het de eerste poging is
        if (attempt === 0) {
          lastError = new Error('HTTP ' + res.status + ' op ' + table);
          await new Promise(function(r) { setTimeout(r, 500); });
          continue;
        }
        throw new Error('HTTP ' + res.status + ' op ' + table);
      }
      // 5xx of 408/429: retry met backoff
      lastError = new Error('HTTP ' + res.status + ' op ' + table);
    } catch (e) {
      lastError = e;
    }
    // Backoff: 500ms, 1500ms (exponential-ish)
    if (attempt < retries) {
      await new Promise(function(r) { setTimeout(r, 500 * Math.pow(2, attempt)); });
    }
  }
  throw lastError || new Error('Onbekende fout op ' + table);
}

    if (hsp) {
      sb += '<div class="sponsor-banner-eyebrow">Powered by</div>';
      var logo = hsp.logoUrl ? '<img src="' + escHtml(hsp.logoUrl) + '" style="height:48px;width:auto;border-radius:4px;vertical-align:middle;margin-right:12px" onerror="this.style.display=\'none\'"/>' : '';
      sb += '<div class="sponsor-banner-name">' + logo + escHtml(hsp.naam) + '</div>';
    }
    if (co.length > 0) {
      sb += '<div class="sponsor-banner-co">';
      sb += '<span style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,0.5);font-weight:700">Mede mogelijk door</span>';
      co.forEach(function(s) {
        var l = s.logoUrl ? '<img src="' + escHtml(s.logoUrl) + '" style="height:28px;border-radius:3px" onerror="this.style.display=\'none\'"/>' : '';
        sb += '<span style="display:inline-flex;align-items:center;gap:6px">' + l + escHtml(s.naam) + '</span>';
      });
      sb += '</div>';
    }
    sb += '</div>';
    sb_el.innerHTML = sb;
  } else {
    sb_el.innerHTML = '';
  }

  // Side games (Neary / LD / Leary) — onder de sponsor-banner
  if (typeof renderSideGamesGrid === 'function') {
    var sgHtml = renderSideGamesGrid(WID, { dark: true });
    if (sgHtml) sb_el.innerHTML += sgHtml;
  }

  // Sponsor carousel onderaan
  if (typeof renderSponsorCarousel === 'function') {
    var carHtml = renderSponsorCarousel(WID, { dark: true, idSuffix: 'share' });
    if (carHtml) sb_el.innerHTML += carHtml;
    if (typeof setupSponsorCarousel === 'function') {
      setupSponsorCarousel(WID, { dark: true, idSuffix: 'share' });
    }
  }

  var nu = new Date().toLocaleTimeString('nl-NL', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
  document.getElementById('lb-refresh-text').textContent = 'Laatst ververst: ' + nu;
}

async function refresh() {
  var ok = await laadWedstrijdData();
  if (ok) {
    if (IS_GW) renderGwLeaderboard();
    else renderLB();
  }
}

function toggleFullscreen() {
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen();
}

// DEBUG
console.log('Leaderboard init — WID:', WID, 'GW_CODE:', GW_CODE);

// GW-mode: verberg TV-only controls (fullscreen, etc.)
if (IS_GW) {
  var ctrlsEl = document.querySelector('.lb-controls');
  if (ctrlsEl) ctrlsEl.style.display = 'none';
}

if (!WID && !GW_CODE) {
  document.getElementById('lb-content').innerHTML = '<div class="lb-error">Geen wedstrijd-ID in URL.<br><br>Gebruik: <code>./leaderboard.html?w=WEDSTRIJD-UUID</code><br><br>Huidige URL: <code>' + window.location.href + '</code></div>';
}

// Start + auto-refresh
refresh().catch(function(e) {
  console.error('Initial refresh failed:', e);
  document.getElementById('lb-content').innerHTML = '<div class="lb-error">Init fout: ' + e.message + '</div>';
});
setInterval(function() {
  refresh().catch(function(e) { console.warn('Refresh failed:', e.message); });
}, 15000);

</script>
